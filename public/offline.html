<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline | The Cellar</title>
    <style>
      :root {
        color-scheme: dark;
        --cellar-bg: #0c1519;
        --cellar-surface: #162127;
        --cellar-card: #3a3534;
        --cellar-border: #2a3a42;
        --cellar-amber: #cf9d7b;
        --cellar-cream: #cf9d7b;
        --cellar-muted: #7a8e94;
      }

      @font-face {
        font-family: 'Battlesbridge';
        src: url('/fonts/BattlesbridgeDemoRegular.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
        font-family: 'Inter', 'Avenir Next', 'Segoe UI', system-ui, sans-serif;
        background: var(--cellar-bg);
        color: var(--cellar-cream);
      }
      main {
        width: min(100%, 28rem);
        padding: 2rem;
        border-radius: 1rem;
        background: var(--cellar-card);
        border: 1px solid var(--cellar-border);
        text-align: center;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
      }
      .eyebrow {
        font-size: 0.75rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--cellar-muted);
        margin: 0 0 0.5rem;
      }
      h1 {
        margin: 0;
        font-family: var(--font-playfair, Georgia), Georgia, serif;
        font-weight: 600;
        font-size: 1.6rem;
        color: var(--cellar-cream);
      }
      p {
        margin: 0.9rem 0 0;
        line-height: 1.5;
        color: var(--cellar-muted);
        font-size: 0.95rem;
      }
      .brand {
        margin: 0.8rem 0 1.15rem;
        font-family: 'Battlesbridge', Georgia, serif;
        color: var(--cellar-amber);
        font-size: 1.6rem;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">The Cellar</p>
      <h1>You're offline</h1>
      <p>Reconnect to the internet to continue using The Cellar.</p>
    </main>
    <script>
      (() => {
        let isReloading = false;

        const tryReconnect = async () => {
          if (isReloading) return;

          try {
            const response = await fetch('/', { method: 'HEAD', cache: 'no-store' });
            if (!response.ok) return;

            isReloading = true;
            window.location.reload();
          } catch (_) {
            // Still offline; keep waiting.
          }
        };

        window.addEventListener('online', tryReconnect);
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') {
            tryReconnect();
          }
        });

        const reconnectInterval = window.setInterval(tryReconnect, 5000);
        window.addEventListener('beforeunload', () => {
          window.clearInterval(reconnectInterval);
        });
      })();
    </script>
  </body>
</html>
